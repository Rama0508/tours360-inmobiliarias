# Configuración de referencia para Nginx como proxy reverso de tours360.
# Reemplazá "tudominio.com" por el dominio real antes de usarlo.
# Este archivo va normalmente en /etc/nginx/sites-available/tours360
# y se activa con: ln -s /etc/nginx/sites-available/tours360 /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name tudominio.com www.tudominio.com;

    # certbot completa esto solo al correr certbot --nginx.
    # Mientras tanto, todo entra por HTTP en este bloque.

    client_max_body_size 25M;  # las fotos 360 originales pueden pesar bastante antes de comprimirse

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Fotos servidas directo por Nginx en vez de pasar por Node — más rápido,
    # y le saca carga al proceso de la app.
    location /uploads/ {
        alias /home/deploy/tours360-inmobiliarias/backend/uploads/;
        expires 30d;
        access_log off;
    }
}

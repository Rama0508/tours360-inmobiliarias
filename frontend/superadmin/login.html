<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Superadmin — Tours 360</title>
  <link rel="stylesheet" href="/shared/estilos.css" />
</head>
<body>
  <div class="pantalla-centrada">
    <div class="tarjeta">
      <h1>Panel de superadmin</h1>
      <form id="form-login">
        <div class="campo">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="username" />
        </div>
        <div class="campo">
          <label for="password">Contraseña</label>
          <input type="password" id="password" required autocomplete="current-password" />
        </div>
        <button type="submit" id="boton-login">Ingresar</button>
        <p class="mensaje-error" id="mensaje-error"></p>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById('form-login');
    const boton = document.getElementById('boton-login');
    const mensajeError = document.getElementById('mensaje-error');

    form.addEventListener('submit', async (evento) => {
      evento.preventDefault();
      mensajeError.textContent = '';
      boton.disabled = true;
      boton.textContent = 'Ingresando...';

      try {
        const respuesta = await fetch('/api/superadmin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
          }),
        });
        const cuerpo = await respuesta.json();
        if (!respuesta.ok) throw new Error(cuerpo.error || 'No pudimos iniciar sesión');

        localStorage.setItem('superadmin_token', cuerpo.token);
        window.location.href = '/superadmin/panel.html';
      } catch (error) {
        mensajeError.textContent = error.message;
      } finally {
        boton.disabled = false;
        boton.textContent = 'Ingresar';
      }
    });
  </script>
</body>
</html>

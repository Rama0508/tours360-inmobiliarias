<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nueva contraseña — Tours 360</title>
  <link rel="stylesheet" href="/shared/estilos.css" />
</head>
<body>
  <div class="pantalla-centrada">
    <div class="tarjeta">
      <h1>Elegí tu nueva contraseña</h1>
      <form id="form-resetear">
        <div class="campo">
          <label for="password">Contraseña nueva</label>
          <input type="password" id="password" required minlength="8" autocomplete="new-password" />
        </div>
        <div class="campo">
          <label for="password2">Repetila</label>
          <input type="password" id="password2" required minlength="8" autocomplete="new-password" />
        </div>
        <button type="submit" id="boton-guardar">Guardar contraseña nueva</button>
        <p class="mensaje-error" id="mensaje-error"></p>
        <p class="mensaje-exito" id="mensaje-exito"></p>
      </form>
    </div>
  </div>

  <script src="/shared/api.js"></script>
  <script>
    const token = new URLSearchParams(window.location.search).get('token');
    const form = document.getElementById('form-resetear');
    const boton = document.getElementById('boton-guardar');
    const mensajeError = document.getElementById('mensaje-error');
    const mensajeExito = document.getElementById('mensaje-exito');

    if (!token) {
      mensajeError.textContent = 'Este link no es válido. Pedí uno nuevo desde "Recuperar contraseña".';
      form.querySelectorAll('input, button').forEach((el) => el.disabled = true);
    }

    form.addEventListener('submit', async (evento) => {
      evento.preventDefault();
      mensajeError.textContent = '';
      mensajeExito.textContent = '';

      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;
      if (password !== password2) {
        mensajeError.textContent = 'Las contraseñas no coinciden';
        return;
      }

      boton.disabled = true;
      boton.textContent = 'Guardando...';
      try {
        const { mensaje } = await api.apiFetch('/auth/resetear-password', {
          method: 'POST',
          body: JSON.stringify({ token, password }),
        });
        mensajeExito.textContent = `${mensaje} Redirigiendo...`;
        setTimeout(() => { window.location.href = '/login.html'; }, 1500);
      } catch (error) {
        mensajeError.textContent = error.message;
        boton.disabled = false;
        boton.textContent = 'Guardar contraseña nueva';
      }
    });
  </script>
</body>
</html>

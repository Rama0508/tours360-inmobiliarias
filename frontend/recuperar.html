<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar contraseña — Tours 360</title>
  <link rel="stylesheet" href="/shared/estilos.css" />
</head>
<body>
  <div class="pantalla-centrada">
    <div class="tarjeta">
      <h1>Recuperar contraseña</h1>
      <form id="form-recuperar">
        <div class="campo">
          <label for="email">Tu email</label>
          <input type="email" id="email" name="email" required autocomplete="username" />
        </div>
        <button type="submit" id="boton-enviar">Enviar link de recuperación</button>
        <p class="mensaje-error" id="mensaje-error"></p>
        <p class="mensaje-exito" id="mensaje-exito"></p>
      </form>
      <p style="text-align:center;margin-top:16px;font-size:0.85rem">
        <a href="/login.html">Volver a iniciar sesión</a>
      </p>
    </div>
  </div>

  <script src="/shared/api.js"></script>
  <script>
    const form = document.getElementById('form-recuperar');
    const boton = document.getElementById('boton-enviar');
    const mensajeError = document.getElementById('mensaje-error');
    const mensajeExito = document.getElementById('mensaje-exito');

    form.addEventListener('submit', async (evento) => {
      evento.preventDefault();
      mensajeError.textContent = '';
      mensajeExito.textContent = '';
      boton.disabled = true;
      boton.textContent = 'Enviando...';

      try {
        const email = document.getElementById('email').value.trim();
        const { mensaje } = await api.apiFetch('/auth/solicitar-reset', {
          method: 'POST',
          body: JSON.stringify({ email }),
        });
        mensajeExito.textContent = mensaje;
        form.reset();
      } catch (error) {
        mensajeError.textContent = error.message;
      } finally {
        boton.disabled = false;
        boton.textContent = 'Enviar link de recuperación';
      }
    });
  </script>
</body>
</html>
